<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>百应智星 - AI 数字员工平台</title>

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Prevent theme flash -->
  <script>
    (function() {
      var theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <style>
    /* ===== THEME VARIABLES ===== */
    :root {
      /* Backgrounds */
      --bg-primary: #0a0a1a;
      --bg-secondary: #0f0f2a;
      --bg-tertiary: #0f0f2a;
      --bg-card: rgba(255, 255, 255, 0.05);
      --bg-card-strong: rgba(255, 255, 255, 0.08);
      --bg-glass: rgba(255, 255, 255, 0.05);
      --bg-glass-strong: rgba(255, 255, 255, 0.08);
      --bg-input: rgba(255, 255, 255, 0.05);
      --bg-hover: rgba(255, 255, 255, 0.08);
      --bg-auth: linear-gradient(-45deg, #0a0a1a, #0f0f2a, #120a2e, #0a0a2e, #0f0f2a);

      /* Text */
      --text-primary: #e2e8f0;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --text-gray: #9ca3af;
      --text-gray-300: #d1d5db;
      --text-gray-400: #9ca3af;
      --text-gray-500: #6b7280;
      --text-white: #ffffff;

      /* Borders */
      --border-glass: rgba(255, 255, 255, 0.1);
      --border-glass-light: rgba(255, 255, 255, 0.08);
      --border-input: rgba(255, 255, 255, 0.15);

      /* Chat bubbles */
      --chat-user-bg: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(139,92,246,0.2));
      --chat-user-border: rgba(139,92,246,0.2);
      --chat-ai-bg: rgba(255,255,255,0.05);
      --chat-ai-border: rgba(255,255,255,0.08);

      /* Misc */
      --skeleton-bg: rgba(255, 255, 255, 0.05);
      --skeleton-border: rgba(255, 255, 255, 0.1);
      --icon-muted: rgba(255, 255, 255, 0.3);
      --modal-overlay: rgba(0, 0, 0, 0.6);
      --badge-bg: rgba(139,92,246,0.15);
      --badge-border: rgba(139,92,246,0.25);
      --scrollbar-thumb: rgba(139, 92, 246, 0.3);
      --scrollbar-thumb-hover: rgba(139, 92, 246, 0.5);
    }

    /* ===== LIGHT THEME ===== */
    [data-theme="light"] {
      --bg-primary: #f0f2f5;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e8eaed;
      --bg-card: rgba(255, 255, 255, 0.7);
      --bg-card-strong: rgba(255, 255, 255, 0.85);
      --bg-glass: rgba(255, 255, 255, 0.6);
      --bg-glass-strong: rgba(255, 255, 255, 0.8);
      --bg-input: rgba(0, 0, 0, 0.04);
      --bg-hover: rgba(0, 0, 0, 0.04);
      --bg-auth: linear-gradient(-45deg, #e8ecf1, #f0f2f5, #f5f0ff, #e8ecf1, #f0f2f5);

      --text-primary: #1a1a2e;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --text-gray: #475569;
      --text-gray-300: #475569;
      --text-gray-400: #64748b;
      --text-gray-500: #94a3b8;
      --text-white: #1a1a2e;

      --border-glass: rgba(0, 0, 0, 0.08);
      --border-glass-light: rgba(0, 0, 0, 0.05);
      --border-input: rgba(0, 0, 0, 0.12);

      --chat-user-bg: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(139,92,246,0.1));
      --chat-user-border: rgba(139,92,246,0.2);
      --chat-ai-bg: rgba(255, 255, 255, 0.8);
      --chat-ai-border: rgba(0, 0, 0, 0.06);

      --skeleton-bg: rgba(0, 0, 0, 0.04);
      --skeleton-border: rgba(0, 0, 0, 0.06);
      --icon-muted: rgba(0, 0, 0, 0.2);
      --modal-overlay: rgba(0, 0, 0, 0.3);
      --badge-bg: rgba(139,92,246,0.1);
      --badge-border: rgba(139,92,246,0.2);
      --scrollbar-thumb: rgba(139, 92, 246, 0.25);
      --scrollbar-thumb-hover: rgba(139, 92, 246, 0.4);

      /* Tailwind utility overrides for light mode */
      --tw-text-white: #1a1a2e;
      --tw-text-gray-50: #1a1a2e;
      --tw-text-gray-100: #1a1a2e;
      --tw-text-gray-200: #1a1a2e;
      --tw-text-gray-300: #475569;
      --tw-text-gray-400: #64748b;
      --tw-text-gray-500: #94a3b8;
      --tw-border-white: rgba(0, 0, 0, 0.08);
      --tw-border-opacity: 0.08;
      --tw-bg-white: rgba(255, 255, 255, 0.85);
      --tw-bg-opacity: 0.85;
    }

    /* Light theme Tailwind overrides */
    [data-theme="light"] .text-white { color: var(--tw-text-white) !important; }
    [data-theme="light"] .text-gray-200 { color: var(--tw-text-gray-200) !important; }
    [data-theme="light"] .text-gray-300 { color: var(--tw-text-gray-300) !important; }
    [data-theme="light"] .text-gray-400 { color: var(--tw-text-gray-400) !important; }
    [data-theme="light"] .text-gray-500 { color: var(--tw-text-gray-500) !important; }
    [data-theme="light"] .border-white\/5,
    [data-theme="light"] .border-white\/10 { border-color: rgba(0, 0, 0, 0.08) !important; }
    [data-theme="light"] .bg-white\/5,
    [data-theme="light"] .bg-white\/10 { background: rgba(255, 255, 255, 0.85) !important; }

    /* ===== RESET & BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

    /* ===== ANIMATIONS ===== */
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes float {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 0.6; }
      25%  { transform: translateY(-100px) translateX(50px); opacity: 0.4; }
      50%  { transform: translateY(-200px) translateX(-30px); opacity: 0.3; }
      75%  { transform: translateY(-300px) translateX(80px); opacity: 0.5; }
      100% { transform: translateY(-400px) translateX(0); opacity: 0; }
    }
    @keyframes float2 {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 0.5; }
      33%  { transform: translateY(-150px) translateX(-60px); opacity: 0.3; }
      66%  { transform: translateY(-280px) translateX(40px); opacity: 0.4; }
      100% { transform: translateY(-420px) translateX(-20px); opacity: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(139,92,246,0.2), 0 0 40px rgba(59,130,246,0.1); }
      50% { box-shadow: 0 0 30px rgba(139,92,246,0.4), 0 0 60px rgba(59,130,246,0.2); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes spin-slow {
      to { transform: rotate(360deg); }
    }

    /* ===== UTILITY CLASSES ===== */
    .bg-dynamic {
      background: linear-gradient(-45deg, var(--bg-primary), var(--bg-secondary), var(--bg-tertiary), var(--bg-secondary));
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }
    .bg-dynamic-auth {
      background: var(--bg-auth);
      background-size: 400% 400%;
      animation: gradientShift 20s ease infinite;
    }

    .glass {
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-glass);
    }
    .glass-hover:hover {
      background: var(--bg-hover);
      border-color: rgba(139, 92, 246, 0.3);
    }
    .glass-strong {
      background: var(--bg-glass-strong);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-glass);
    }

    .glow-border {
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.3), 0 0 30px rgba(59, 130, 246, 0.1);
    }
    .glow-border-hover:hover {
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.4), 0 0 40px rgba(59, 130, 246, 0.2);
      border-color: rgba(139, 92, 246, 0.4);
    }

    .text-gradient {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .text-gradient-primary {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn-gradient {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-gradient:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
    }
    .btn-gradient:active {
      transform: translateY(0);
    }

    .btn-ripple {
      position: relative;
      overflow: hidden;
    }
    .btn-ripple::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: scale(0);
      opacity: 1;
    }
    .btn-ripple:active::after {
      animation: ripple 0.6s ease-out;
    }

    /* ===== AUTH PARTICLES ===== */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(139, 92, 246, 0.6);
      border-radius: 50%;
      pointer-events: none;
    }
    .particle:nth-child(1)  { left: 10%; top: 60%; animation: float 8s infinite; width: 3px; height: 3px; }
    .particle:nth-child(2)  { left: 20%; top: 40%; animation: float2 10s infinite 1s; width: 5px; height: 5px; background: rgba(59,130,246,0.5); }
    .particle:nth-child(3)  { left: 30%; top: 70%; animation: float 9s infinite 2s; width: 3px; height: 3px; background: rgba(34,211,238,0.5); }
    .particle:nth-child(4)  { left: 45%; top: 30%; animation: float2 11s infinite 0.5s; width: 4px; height: 4px; }
    .particle:nth-child(5)  { left: 55%; top: 65%; animation: float 7s infinite 3s; width: 3px; height: 3px; background: rgba(59,130,246,0.6); }
    .particle:nth-child(6)  { left: 65%; top: 45%; animation: float2 12s infinite 1.5s; width: 5px; height: 5px; }
    .particle:nth-child(7)  { left: 75%; top: 55%; animation: float 8s infinite 0.5s; width: 3px; height: 3px; background: rgba(34,211,238,0.4); }
    .particle:nth-child(8)  { left: 85%; top: 35%; animation: float2 9s infinite 2.5s; width: 4px; height: 4px; }
    .particle:nth-child(9)  { left: 15%; top: 80%; animation: float 10s infinite 1s; width: 3px; height: 3px; }
    .particle:nth-child(10) { left: 50%; top: 20%; animation: float2 8s infinite 3s; width: 4px; height: 4px; background: rgba(139,92,246,0.7); }
    .particle:nth-child(11) { left: 35%; top: 50%; animation: float 11s infinite 2s; width: 3px; height: 3px; }
    .particle:nth-child(12) { left: 70%; top: 75%; animation: float2 7s infinite 1.5s; width: 5px; height: 5px; background: rgba(59,130,246,0.4); }
    .particle:nth-child(13) { left: 5%; top: 25%; animation: float 9s infinite 3.5s; width: 3px; height: 3px; }
    .particle:nth-child(14) { left: 95%; top: 50%; animation: float2 10s infinite 0.5s; width: 4px; height: 4px; background: rgba(34,211,238,0.5); }
    .particle:nth-child(15) { left: 40%; top: 90%; animation: float 8s infinite 2.5s; width: 3px; height: 3px; }

    /* ===== INPUT STYLES ===== */
    .input-glow {
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }
    .input-glow:focus {
      outline: none;
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2), 0 0 20px rgba(139, 92, 246, 0.1);
      background: var(--bg-hover);
    }
    .input-glow::placeholder { color: var(--text-muted); }

    /* ===== CARD EFFECTS ===== */
    .card-float {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .card-float:hover {
      transform: translateY(-6px) scale(1.01);
    }

    /* ===== TYPING EFFECT ===== */
    .typing-cursor::after {
      content: '|';
      animation: blink 1s infinite;
      color: #8b5cf6;
      margin-left: 2px;
    }

    /* ===== CHAT BUBBLES ===== */
    .chat-user {
      background: var(--chat-user-bg);
      border: 1px solid var(--chat-user-border);
      border-radius: 18px 18px 4px 18px;
      max-width: 75%;
      margin-left: auto;
      animation: slideInRight 0.3s ease;
    }
    .chat-ai {
      background: var(--chat-ai-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--chat-ai-border);
      border-radius: 18px 18px 18px 4px;
      max-width: 80%;
      animation: slideUp 0.3s ease;
    }

    /* ===== SKILL BADGE ===== */
    .skill-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      background: var(--badge-bg);
      border: 1px solid var(--badge-border);
      color: #a78bfa;
      transition: all 0.2s;
    }
    .skill-badge:hover {
      background: rgba(139,92,246,0.25);
    }
    .skill-badge-cyan {
      background: rgba(34,211,238,0.12);
      border-color: rgba(34,211,238,0.2);
      color: #22d3ee;
    }
    .skill-badge-emerald {
      background: rgba(52,211,153,0.12);
      border-color: rgba(52,211,153,0.2);
      color: #34d399;
    }
    .skill-badge-amber {
      background: rgba(251,191,36,0.12);
      border-color: rgba(251,191,36,0.2);
      color: #fbbf24;
    }
    .skill-badge-rose {
      background: rgba(244,63,94,0.12);
      border-color: rgba(244,63,94,0.2);
      color: #fb7185;
    }

    /* ===== LOADING SPINNER ===== */
    .spinner-ring {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(139,92,246,0.15);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin-slow 0.8s linear infinite;
    }

    /* ===== PAGE TRANSITIONS ===== */
    .page-enter {
      animation: fadeIn 0.4s ease;
    }

    /* ===== NAV LINK ===== */
    .nav-link {
      position: relative;
      color: rgba(255,255,255,0.5);
      transition: all 0.3s;
      cursor: pointer;
    }
    .nav-link:hover {
      color: rgba(255,255,255,0.8);
    }
    .nav-link.active {
      color: #a78bfa;
    }
    .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 1px;
    }

    /* ===== RESPONSIVE ADJUSTMENTS ===== */
    @media (max-width: 768px) {
      .chat-user, .chat-ai { max-width: 90%; }
    }

    /* ===== LANDING PAGE ===== */
    .landing-section {
      min-height: 100vh;
      scroll-snap-align: start;
    }
    .hero-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
    }
    .hero-glow-1 { background: #8b5cf6; top: -10%; left: -5%; animation: pulse-glow 4s ease-in-out infinite; }
    .hero-glow-2 { background: #3b82f6; bottom: -10%; right: -5%; animation: pulse-glow 4s ease-in-out infinite 2s; }
    .hero-glow-3 { background: #22d3ee; top: 40%; left: 40%; animation: pulse-glow 6s ease-in-out infinite 1s; }

    @keyframes countUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .stat-number {
      background: linear-gradient(135deg, #fff 30%, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .scroll-indicator {
      animation: float 2s ease-in-out infinite;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }
    .orb {
      animation: orbFloat 6s ease-in-out infinite;
    }
    .orb:nth-child(2) { animation-delay: -2s; }
    .orb:nth-child(3) { animation-delay: -4s; }

    .benefit-icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: all 0.3s;
    }
    .card-float:hover .benefit-icon-wrap {
      transform: scale(1.1);
    }

    /* Scroll snap */
    html { scroll-behavior: smooth; }

    /* ===== EMPLOYEE AVATAR ===== */
    .emp-avatar {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(139,92,246,0.15));
      border: 1px solid rgba(139,92,246,0.15);
      font-size: 28px;
      transition: all 0.3s;
    }
    .card-float:hover .emp-avatar {
      border-color: rgba(139,92,246,0.4);
      box-shadow: 0 0 20px rgba(139,92,246,0.2);
    }
  </style>
</head>
<body>

  <!-- ================================================================ -->
  <!-- ROOT: x-data on body to hold ALL Alpine state + methods          -->
  <!-- ================================================================ -->
  <div x-data="app()" x-init="init()" class="min-h-screen bg-dynamic">

    <!-- ============================================================== -->
    <!-- LANDING PAGE (shown when NOT logged in)                        -->
    <!-- ============================================================== -->
    <template x-if="!isLoggedIn">
      <div class="fixed inset-0 z-50 overflow-y-auto bg-dynamic" x-data="{ showMobileMenu: false }">

        <!-- ===== NAVBAR ===== -->
        <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/5">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
              <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-violet-500 flex items-center justify-center shadow-lg">
                  <i class="fas fa-robot text-white text-xs"></i>
                </div>
                <span class="text-lg font-bold text-gradient">百应智星</span>
              </div>
              <div class="hidden md:flex items-center gap-8">
                <a href="#advantages" class="text-sm text-gray-400 hover:text-white transition">核心优势</a>
                <a href="#usecases" class="text-sm text-gray-400 hover:text-white transition">应用场景</a>
                <a href="#stats" class="text-sm text-gray-400 hover:text-white transition">数据</a>
                <!-- Theme toggle -->
                <button @click="toggleTheme" class="text-gray-400 hover:text-white transition text-lg" title="切换主题">
                  <i :class="theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon'"></i>
                </button>
                <button @click="showAuthModal = true"
                        class="btn-gradient px-5 py-2 rounded-lg text-sm font-semibold text-white btn-ripple">
                  <i class="fas fa-sign-in-alt mr-1.5"></i>登录
                </button>
              </div>
              <!-- Mobile menu button -->
              <button @click="showMobileMenu = !showMobileMenu" class="md:hidden text-gray-400 hover:text-white text-xl">
                <i :class="showMobileMenu ? 'fas fa-times' : 'fas fa-bars'"></i>
              </button>
            </div>
            <!-- Mobile menu -->
            <div x-show="showMobileMenu" class="md:hidden pb-4 space-y-3">
              <a href="#advantages" @click="showMobileMenu = false" class="block text-sm text-gray-400 hover:text-white transition">核心优势</a>
              <a href="#usecases" @click="showMobileMenu = false" class="block text-sm text-gray-400 hover:text-white transition">应用场景</a>

  <!-- ================================================================ -->
  <!-- ALPINE.JS APP LOGIC                                              -->
  <!-- ================================================================ -->
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('app', () => ({
        // ---- Theme ----
        theme: localStorage.getItem('theme') || 'dark',

        // ---- Auth ----
        token: localStorage.getItem('token') || null,
        user: null,
        isLoggedIn: false,
        showAuthModal: false,

        // ---- Auth Form ----
        showLogin: true,
        authEmail: '',
        authPassword: '',
        authUsername: '',
        authLoading: false,

        // ---- Pages ----
        currentPage: 'store',

        // ---- Employees ----
        employees: [],
        selectedEmployee: null,

        // ---- Chat ----
        chatInput: '',
        messages: [],
        isStreaming: false,
        streamingContent: '',
        currentConversationId: null,

        // ---- Toast ----
        toast: { show: false, message: '', type: 'info' },

        // ================================================================
        // INIT
        // ================================================================
        async init() {
          // Apply saved theme
          document.documentElement.setAttribute('data-theme', this.theme);

          // If we have a stored token, try to validate it
          if (this.token) {
            try {
              const res = await fetch('/api/v1/auth/me', {
                headers: { 'Authorization': `Bearer ${this.token}` }
              });
              if (res.ok) {
                this.user = await res.json();
                this.isLoggedIn = true;
                await this.loadEmployees();
                return;
              } else {
                // Token expired
                localStorage.removeItem('token');
                this.token = null;
              }
            } catch (e) {
              // Network error — keep token, try anyway
              this.isLoggedIn = true;
              this.user = { username: '用户' };
              await this.loadEmployees();
              return;
            }
          }
          // Not logged in — auth page will show
        },

        // ================================================================
        // THEME
        // ================================================================
        toggleTheme() {
          this.theme = this.theme === 'dark' ? 'light' : 'dark';
          localStorage.setItem('theme', this.theme);
          document.documentElement.setAttribute('data-theme', this.theme);
        },

        // ================================================================
        // TOAST
        // ================================================================
        showToast(message, type = 'info') {
          this.toast = { show: true, message, type };
          setTimeout(() => { this.toast.show = false; }, 3500);
        },

        // ================================================================
        // AUTH
        // ================================================================
        async login() {
          this.authLoading = true;
          try {
            const res = await fetch('/api/v1/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: this.authEmail, password: this.authPassword })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '登录失败');
            this.token = data.access_token;
            this.user = data.user;
            this.isLoggedIn = true;
            localStorage.setItem('token', this.token);
            this.showToast('登录成功，欢迎回来！', 'success');
            await this.loadEmployees();
          } catch (e) {
            this.showToast(e.message || '登录失败，请检查账号密码', 'error');
          } finally {
            this.authLoading = false;
          }
        },

        async register() {
          this.authLoading = true;
          try {
            const res = await fetch('/api/v1/auth/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                username: this.authUsername,
                email: this.authEmail,
                password: this.authPassword
              })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || '注册失败');
            this.token = data.access_token;
            this.user = data.user;
            this.isLoggedIn = true;
            localStorage.setItem('token', this.token);
            this.showToast('注册成功，欢迎加入！', 'success');
            await this.loadEmployees();
          } catch (e) {
            this.showToast(e.message || '注册失败', 'error');
          } finally {
            this.authLoading = false;
          }
        },

        logout() {
          this.token = null;
          this.user = null;
          this.isLoggedIn = false;
          this.employees = [];
          this.selectedEmployee = null;
          this.messages = [];
          this.currentPage = 'store';
          localStorage.removeItem('token');
          this.showToast('已退出登录', 'info');
        },

        // ================================================================
        // EMPLOYEES
        // ================================================================
        async loadEmployees() {
          try {
            const res = await fetch('/api/v1/employees');
            if (res.ok) {
              this.employees = await res.json();
            }
          } catch (e) {
            console.error('Failed to load employees', e);
          }
        },

        // ================================================================
        // CHAT
        // ================================================================
        async selectEmployee(emp) {
          this.selectedEmployee = emp;
          this.currentPage = 'chat';
          this.messages = [];
          this.currentConversationId = null;
          this.streamingContent = '';

          // Send welcome message via SSE
          await this.startConversation(emp);
        },

        async startConversation(emp) {
          this.isStreaming = true;

          // Add a placeholder AI message that will be streamed into
          const aiMsg = { role: 'assistant', content: '', skills_used: [] };
          this.messages.push(aiMsg);

          try {
            const res = await fetch('/api/v1/chat/send', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${this.token}`
              },
              body: JSON.stringify({
                employee_id: emp.id,
                message: '你好'
              })
            });

            if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              throw new Error(errData.detail || `请求失败 (${res.status})`);
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;

              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split('\n');
              buffer = lines.pop() || '';  // Keep incomplete line in buffer

              for (const line of lines) {
                if (line.startsWith('data: ')) {
                  try {
                    const payload = JSON.parse(line.slice(6));
                    if (payload.content) {
                      this.streamingContent += payload.content;
                      // Update the last assistant message
                      if (this.messages.length > 0) {
                        this.messages[this.messages.length - 1].content = this.streamingContent;
                      }
                      // Auto-scroll
                      this.$nextTick(() => {
                        const el = this.$refs.chatMessages;
                        if (el) el.scrollTop = el.scrollHeight;
                      });
                    }
                    if (payload.done) {
                      this.currentConversationId = payload.conversation_id;
                      // Finalize the message
                      if (this.messages.length > 0) {
                        const lastMsg = this.messages[this.messages.length - 1];
                        lastMsg.content = this.streamingContent;
                        lastMsg.skills_used = payload.skills_used || [];
                      }
                      this.streamingContent = '';
                      this.isStreaming = false;
                    }
                  } catch (e) {
                    // Skip malformed JSON lines
                  }
                }
              }
            }
          } catch (e) {
            this.showToast(e.message || '对话初始化失败', 'error');
            // Remove the placeholder message on error
            this.messages = this.messages.filter(m => m.content !== '');
            this.streamingContent = '';
          } finally {
            this.isStreaming = false;
          }
        },

        async sendMessage() {
          const msg = this.chatInput.trim();
          if (!msg || !this.selectedEmployee || this.isStreaming) return;

          // Add user message
          this.messages.push({ role: 'user', content: msg });
          this.chatInput = '';

          // Add placeholder for AI response
          const aiMsg = { role: 'assistant', content: '', skills_used: [] };
          this.messages.push(aiMsg);

          this.isStreaming = true;
          this.streamingContent = '';

          // Auto-scroll
          this.$nextTick(() => {
            const el = this.$refs.chatMessages;
            if (el) el.scrollTop = el.scrollHeight;
          });

          try {
            const res = await fetch('/api/v1/chat/send', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${this.token}`
              },
              body: JSON.stringify({
                employee_id: this.selectedEmployee.id,
                message: msg,
                conversation_id: this.currentConversationId
              })
            });

            if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              throw new Error(errData.detail || `请求失败 (${res.status})`);
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;

              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split('\n');
              buffer = lines.pop() || '';

              for (const line of lines) {
                if (line.startsWith('data: ')) {
                  try {
                    const payload = JSON.parse(line.slice(6));
                    if (payload.content) {
                      this.streamingContent += payload.content;
                      if (this.messages.length > 0) {
                        this.messages[this.messages.length - 1].content = this.streamingContent;
                      }
                      this.$nextTick(() => {
                        const el = this.$refs.chatMessages;
                        if (el) el.scrollTop = el.scrollHeight;
                      });
                    }
                    if (payload.done) {
                      this.currentConversationId = payload.conversation_id;
                      if (this.messages.length > 0) {
                        const lastMsg = this.messages[this.messages.length - 1];
                        lastMsg.content = this.streamingContent;
                        lastMsg.skills_used = payload.skills_used || [];
                      }
                      this.streamingContent = '';
                      this.isStreaming = false;
                    }
                  } catch (e) {
                    // skip
                  }
                }
              }
            }
          } catch (e) {
            this.showToast(e.message || '发送失败', 'error');
            this.messages = this.messages.filter(m => m.content !== '');
            this.streamingContent = '';
          } finally {
            this.isStreaming = false;
          }
        },

        clearChat() {
          this.messages = [];
          this.currentConversationId = null;
          this.streamingContent = '';
          this.isStreaming = false;
          if (this.selectedEmployee) {
            this.startConversation(this.selectedEmployee);
          }
        },

        // ================================================================
        // NAVIGATION
        // ================================================================
        switchPage(page) {
          this.currentPage = page;
          if (page === 'chat' && !this.selectedEmployee && this.employees.length > 0) {
            // Optionally auto-select first employee
          }
        }
      }));
    });
  </script>
